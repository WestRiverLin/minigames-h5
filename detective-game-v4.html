<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>迷雾侦探 - 密室疑云</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'Georgia', serif;
            overflow: hidden;
            touch-action: none;
            color: #e0e0e0;
        }
        #game {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 顶部状态栏 */
        #status-bar {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            z-index: 100;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }
        .status-icon { font-size: 14px; }
        
        /* 主场景区域 - 4:3 比例 */
        #scene {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
            flex-shrink: 0;
        }
        
        /* 场景基础层 */
        .scene-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: all 0.5s ease;
        }
        
        /* 书房场景 */
        .scene-study {
            background: linear-gradient(180deg, rgba(20,15,10,0.95) 0%, rgba(40,30,20,0.85) 50%, rgba(30,25,20,0.95) 100%);
        }
        .scene-study::before {
            content: '';
            position: absolute;
            top: 15%; left: 8%; right: 8%; height: 35%;
            background: linear-gradient(90deg, transparent 0%, rgba(60,50,40,0.5) 10%, rgba(80,60,40,0.3) 50%, rgba(60,50,40,0.5) 90%, transparent 100%);
            border-radius: 3px;
        }
        .scene-study::after {
            content: '';
            position: absolute;
            bottom: 12%; left: 12%; width: 35%; height: 22%;
            background: linear-gradient(180deg, #4a3728 0%, #2a1f15 100%);
            border-radius: 2px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        
        /* 走廊场景 */
        .scene-hallway {
            background: repeating-linear-gradient(90deg, rgba(30,25,20,0.9) 0%, rgba(30,25,20,0.9) 15%, rgba(20,18,15,0.95) 15%, rgba(20,18,15,0.95) 20%),
                linear-gradient(180deg, rgba(15,12,10,0.95) 0%, rgba(25,20,15,0.85) 60%, rgba(20,18,15,0.95) 100%);
        }
        .scene-hallway::before {
            content: '';
            position: absolute;
            top: 8%; left: 50%; transform: translateX(-50%);
            width: 25%; height: 12%;
            background: radial-gradient(ellipse, rgba(255,200,150,0.12) 0%, transparent 70%);
            box-shadow: 0 0 40px 15px rgba(255,200,150,0.06);
        }
        
        /* 大门场景 */
        .scene-gate {
            background: linear-gradient(180deg, rgba(10,15,25,0.95) 0%, rgba(20,25,35,0.9) 40%, rgba(15,20,30,0.95) 100%);
        }
        .scene-gate::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(100deg, transparent 0%, transparent 48%, rgba(150,180,220,0.12) 49%, transparent 50%);
            animation: rain 0.5s linear infinite;
        }
        @keyframes rain {
            from { background-position: 0 0; }
            to { background-position: 40px 80px; }
        }
        .scene-gate::after {
            content: '';
            position: absolute;
            top: 25%; left: 12%; width: 18%; height: 12%;
            background: radial-gradient(ellipse, rgba(255,50,50,0.35) 0%, transparent 70%);
            animation: police-red 1s infinite;
        }
        @keyframes police-red {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.85; }
        }
        .police-blue {
            position: absolute !important;
            top: 25%; right: 12%; width: 18%; height: 12%;
            background: radial-gradient(ellipse, rgba(50,50,255,0.35) 0%, transparent 70%);
            animation: police-blue 1s infinite;
        }
        @keyframes police-blue {
            0%, 100% { opacity: 0.85; }
            50% { opacity: 0.35; }
        }
        
        /* 走廊 - 神秘男人 */
        .scene-hallway-mystery {
            background: repeating-linear-gradient(90deg, rgba(30,25,20,0.9) 0%, rgba(30,25,20,0.9) 15%, rgba(20,18,15,0.95) 15%, rgba(20,18,15,0.95) 20%),
                linear-gradient(180deg, rgba(15,12,10,0.95) 0%, rgba(25,20,15,0.85) 60%, rgba(20,18,15,0.95) 100%);
        }
        .scene-hallway-mystery::before {
            content: '';
            position: absolute;
            bottom: 8%; right: 22%; width: 22%; height: 35%;
            background: linear-gradient(180deg, #1a1510 0%, #0a0805 100%);
            border-radius: 40% 40% 0 0;
            filter: blur(2px);
        }
        
        /* 结局场景 */
        .scene-ending {
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
        }
        .scene-ending::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.85) 100%);
        }
        
        /* 暗角效果 */
        .vignette {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.65) 100%);
            pointer-events: none;
        }
        
        /* 粒子 */
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.35);
            border-radius: 50%;
            animation: float 3s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-80px) rotate(360deg); opacity: 0; }
        }
        
        /* 可点击区域 */
        .hotspot {
            position: absolute;
            background: rgba(255, 215, 0, 0.25);
            border: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }
        .hotspot:hover {
            background: rgba(255, 215, 0, 0.45);
            transform: scale(1.08);
        }
        .hotspot.collected {
            background: rgba(100, 100, 100, 0.25);
            border-color: rgba(100, 100, 100, 0.5);
            animation: none;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 8px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
        }
        
        /* 对话区域 */
        #dialogue-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, rgba(20,20,30,0.98) 0%, rgba(10,10,15,0.99) 100%);
            border-top: 2px solid #444;
            padding: 15px;
            min-height: 200px;
            z-index: 100;
            overflow-y: auto;
        }
        #speaker {
            color: #ffd700;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
        /* 问答题样式 */
        #speaker.quiz-question {
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        #dialogue-text {
            font-size: 14px;
            line-height: 1.7;
            color: #d0d0d0;
            margin-bottom: 15px;
        }
        
        /* 角色立绘 - 叠加在场景上方中央 */
        #character-portrait {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 140px;
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 50;
            pointer-events: none;
        }
        #character-portrait.visible {
            display: flex;
        }
        /* 立绘淡入效果 */
        #character-portrait .portrait-figure {
            animation: portraitFadeIn 0.5s ease, breathe 3s infinite ease-in-out;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.8));
        }
        @keyframes portraitFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 抽象人物立绘 */
        .portrait-figure {
            position: relative;
            width: 90px;
            height: 130px;
            animation: breathe 3s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.02); }
        }
        
        /* 头部 */
        .portrait-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 60px;
            border-radius: 50%;
            animation: blink 4s infinite;
        }
        @keyframes blink {
            0%, 48%, 52%, 100% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(0.1); }
        }
        
        /* 身体 */
        .portrait-body {
            position: absolute;
            top: 58px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 72px;
            border-radius: 20px 20px 0 0;
        }
        
        /* 管家王伯 - 灰色系 */
        .portrait-butler .portrait-head {
            background: linear-gradient(180deg, #c0c0c0 0%, #909090 100%);
            border: 2px solid #606060;
        }
        .portrait-butler .portrait-body {
            background: linear-gradient(180deg, #505050 0%, #303030 100%);
            border: 2px solid #404040;
        }
        .portrait-butler .portrait-head::after {
            content: '';
            position: absolute;
            top: 18px; left: 50%;
            transform: translateX(-50%);
            width: 32px; height: 10px;
            border: 2px solid #404040;
            border-radius: 3px;
            background: rgba(255,255,255,0.2);
        }
        
        /* 李明 - 深蓝色系 */
        .portrait-li .portrait-head {
            background: linear-gradient(180deg, #e0d0c0 0%, #c0b0a0 100%);
            border: 2px solid #807060;
        }
        .portrait-li .portrait-body {
            background: linear-gradient(180deg, #2a3a5a 0%, #1a2a3a 100%);
            border: 2px solid #1a2a3a;
            box-shadow: 0 0 15px rgba(50,100,150,0.3);
        }
        .portrait-li.nervous .portrait-figure {
            animation: nervous 0.5s infinite;
        }
        @keyframes nervous {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }
        
        /* 侦探 - 暖色调 */
        .portrait-detective .portrait-head {
            background: linear-gradient(180deg, #f0e0d0 0%, #d0c0b0 100%);
            border: 2px solid #908070;
        }
        .portrait-detective .portrait-body {
            background: linear-gradient(180deg, #4a3a2a 0%, #2a1a0a 100%);
            border: 2px solid #3a2a1a;
        }
        .portrait-detective .portrait-head::before {
            content: '';
            position: absolute;
            top: -5px; left: 50%;
            transform: translateX(-50%);
            width: 52px; height: 14px;
            background: linear-gradient(180deg, #3a2a1a 0%, #2a1a0a 100%);
            border-radius: 3px;
        }
        
        /* 旁白 - 剪影效果 */
        .portrait-narrator .portrait-figure { opacity: 0.5; }
        .portrait-narrator .portrait-head {
            background: linear-gradient(180deg, #606060 0%, #404040 100%);
        }
        .portrait-narrator .portrait-body {
            background: linear-gradient(180deg, #303030 0%, #1a1a1a 100%);
        }
        
        /* 对话内容区域 */
        #dialogue-content {
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        #speaker {
            color: #ffd700;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            text-align: center;
        }
        #dialogue-text {
            font-size: 14px;
            line-height: 1.7;
            color: #d0d0d0;
            margin-bottom: 15px;
            text-align: left;
        }
        
        /* 选项按钮 */
        #choices {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            opacity: 0;
            pointer-events: none;
        }
        #choices.visible {
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.5s ease;
        }
        .choice-btn {
            background: linear-gradient(90deg, #2a2a3e 0%, #1a1a2e 100%);
            border: 1px solid #444;
            padding: 10px 14px;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 42px;
        }
        .choice-btn:hover {
            background: linear-gradient(90deg, #3a3a4e 0%, #2a2a3e 100%);
            border-color: #666;
            transform: translateX(5px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        .choice-btn:active {
            transform: translateX(3px);
        }
        /* 已选过的选项标记 */
        .choice-btn.selected {
            opacity: 0.6;
            border-left: 3px solid #ffd700;
        }
        .choice-btn.selected::after {
            content: ' ✓';
            color: #ffd700;
            font-weight: bold;
        }
        
        /* 线索面板 */
        #clue-panel {
            position: absolute;
            top: 45px;
            right: 8px;
            background: rgba(10,10,15,0.95);
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px;
            max-width: 160px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        #clue-panel.show { display: block; }
        #clue-panel::-webkit-scrollbar { width: 4px; }
        #clue-panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 2px; }
        #clue-panel::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 2px; }
        .clue-item {
            font-size: 11px;
            padding: 6px 8px;
            margin: 3px 0;
            background: rgba(255,215,0,0.08);
            border-left: 2px solid #ffd700;
            border-radius: 3px;
            color: #e0d0a0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.2s;
        }
        .clue-item:hover {
            background: rgba(255,215,0,0.15);
            padding-left: 12px;
        }
        .clue-item:active { transform: scale(0.98); }
        
        /* 线索详情弹窗 */
        #clue-detail-modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 150;
            padding: 20px;
        }
        #clue-detail-modal.show { display: flex; }
        
        /* 保险箱转轮 UI */
        #safe-modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 160;
            padding: 20px;
        }
        #safe-modal.show { display: flex; }
        .safe-title {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }
        .safe-dials {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .safe-dial {
            width: 60px;
            height: 80px;
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border: 2px solid #444;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .safe-dial-value {
            font-size: 36px;
            color: #ffd700;
            font-weight: bold;
            line-height: 1;
        }
        .safe-dial-btn {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            width: 40px;
            height: 30px;
            margin: 5px 0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .safe-dial-btn:active { background: #444; }
        .safe-buttons {
            display: flex;
            gap: 15px;
        }
        .safe-btn {
            background: linear-gradient(90deg, #2a2a3e 0%, #1a1a2e 100%);
            border: 1px solid #444;
            padding: 12px 30px;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .safe-btn:hover {
            background: linear-gradient(90deg, #3a3a4e 0%, #2a2a3e 100%);
            border-color: #666;
        }
        .safe-btn.try {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            font-weight: bold;
        }
        .clue-detail-content {
            background: linear-gradient(180deg, rgba(20,20,30,0.98) 0%, rgba(10,10,15,0.99) 100%);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 20px;
            max-width: 90%;
            max-height: 70%;
            overflow-y: auto;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
        }
        .clue-detail-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .clue-detail-text {
            color: #d0d0d0;
            font-size: 14px;
            line-height: 1.8;
        }
        .clue-detail-close {
            margin-top: 15px;
            background: linear-gradient(90deg, #2a2a3e 0%, #1a1a2e 100%);
            border: 1px solid #444;
            padding: 10px 25px;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .clue-detail-close:hover {
            background: linear-gradient(90deg, #3a3a4e 0%, #2a2a3e 100%);
            border-color: #666;
        }
        
        /* 开始/结束屏幕 */
        #start-screen, #end-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 25px;
            z-index: 200;
            overflow-y: auto;
        }
        #start-screen h1, #end-screen h1 {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            letter-spacing: 2px;
            flex-shrink: 0;
        }
        #start-screen p, #end-screen p {
            font-size: 13px;
            color: #888;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
            max-width: 400px;
            flex-shrink: 0;
        }
        #end-screen .start-btn {
            flex-shrink: 0;
            margin-top: 10px;
        }
        .start-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            border: none;
            padding: 14px 45px;
            font-size: 17px;
            color: #000;
            font-weight: bold;
            border-radius: 28px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            transition: all 0.3s;
            min-height: 50px;
        }
        .start-btn:hover {
            box-shadow: 0 6px 30px rgba(255, 215, 0, 0.6);
            transform: scale(1.05);
        }
        .start-btn:active { transform: scale(0.95); }
        #end-screen { display: none; }
        
        /* 打字机效果 */
        .typing {
            border-right: 2px solid #ffd700;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            0%, 100% { border-color: #ffd700; }
            50% { border-color: transparent; }
        }
        
        /* 转场 */
        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* 标题动画 */
        .title-glow {
            animation: titleGlow 3s infinite;
        }
        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { text-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 200, 0, 0.4); }
        }
    </style>
</head>
<body>
    <div id="game">
        <!-- 状态栏 -->
        <div id="status-bar">
            <div class="status-item">
                <span class="status-icon">📍</span>
                <span id="location">???</span>
            </div>
            <div class="status-item">
                <span class="status-icon">🕐</span>
                <span id="time">???</span>
            </div>
            <div class="status-item">
                <span class="status-icon">💡</span>
                <span id="clue-count">线索：0</span>
            </div>
        </div>
        
        <!-- 场景 4:3 -->
        <div id="scene">
            <div class="scene-bg scene-gate" id="scene-bg"></div>
            <div class="vignette"></div>
            <div id="particles"></div>
            <div id="hotspots"></div>
            <!-- 角色立绘 - 场景上方中央 -->
            <div id="character-portrait">
                <div class="portrait-figure" id="portrait-figure">
                    <div class="portrait-head" id="portrait-head"></div>
                    <div class="portrait-body" id="portrait-body"></div>
                </div>

        // 检查真结局
        function checkTrueEnding() {
            const requiredClues = [
                '钥匙孔有异常划痕',
                '死因：氰化物中毒',
                '李明与死者有商业纠纷',
                '死者手中：深蓝色西装布料',
                '保险箱证据：神秘账本'
            ];
            return requiredClues.every(clue => state.clues.includes(clue));
        }

        // 开始游戏
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            createParticles();
            state.quizScore = 0;
            state.quizTotal = 0;
            state.gameTime = 0;  // 从午夜 0:00 开始
            state.maxTime = 60;  // 60 分钟限制
            loadScene('start');
        }
        
        // 更新时间
        function updateTime() {
            // 问答环节和结局不计时
            if (state.currentScene.startsWith('quiz_') || state.currentScene.startsWith('ending_')) {
                return;
            }
            
            state.gameTime++;
            const hours = Math.floor(state.gameTime / 60);
            const minutes = state.gameTime % 60;
            const timeStr = (hours === 0 ? '00:' : (hours < 10 ? '0' + hours + ':' : hours + ':')) + 
                           (minutes < 10 ? '0' + minutes : minutes);
            document.getElementById('time').textContent = timeStr;
            
            // 检查是否超时
            if (state.gameTime >= state.maxTime && !state.currentScene.startsWith('ending_') && state.currentScene !== 'death') {
                loadScene('death');
            }
        }

        // 创建粒子
        function createParticles() {
            const container = document.getElementById('particles');
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
                container.appendChild(particle);
            }
        }

        // 设置角色立绘
        function setCharacter(characterType, isNervous = false) {
            const portrait = document.getElementById('character-portrait');
            const figure = document.getElementById('portrait-figure');
            
            // 移除所有类型和动画
            figure.classList.remove('portrait-butler', 'portrait-li', 'portrait-detective', 'portrait-narrator');
            figure.parentElement.classList.remove('nervous');
            
            // 旁白不显示立绘
            if (characterType && characterType !== 'none' && characterType !== 'narrator') {
                portrait.classList.add('visible');
                figure.classList.add('portrait-' + characterType);
                
                if (isNervous && characterType === 'li') {
                    figure.parentElement.classList.add('nervous');
                }
            } else {
                portrait.classList.remove('visible');
            }
        }

        // 加载场景
        function loadScene(sceneId) {
            const scene = scenes[sceneId];
            if (!scene) return;
            
            state.currentScene = sceneId;
            state.visited[sceneId] = true;
            
            // 更新场景背景
            const sceneBg = document.getElementById('scene-bg');
            sceneBg.className = 'scene-bg ' + (scene.sceneClass || 'scene-gate') + ' fade-in';
            
            // 处理警灯
            const existingBlue = document.querySelector('.police-blue');
            if (scene.sceneClass === 'scene-gate' && !existingBlue) {
                const blue = document.createElement('div');
                blue.className = 'police-blue';
                document.getElementById('scene').appendChild(blue);
            } else if (scene.sceneClass !== 'scene-gate' && existingBlue) {
                existingBlue.remove();
            }
            
            // 更新状态栏
            document.getElementById('location').textContent = scene.location;
            // 动态时间显示
            if (scene.time === 'dynamic') {
                const hours = Math.floor(state.gameTime / 60);
                const minutes = state.gameTime % 60;
                document.getElementById('time').textContent = 
                    (hours === 0 ? '00:' : (hours < 10 ? '0' + hours + ':' : hours + ':')) + 
                    (minutes < 10 ? '0' + minutes : minutes);
            } else {
                document.getElementById('time').textContent = scene.time;
            }
            document.getElementById('clue-count').textContent = '线索：' + state.clues.length;
            
            // 设置角色立绘
            const charType = characterTypes[scene.speaker] || 'narrator';
            setCharacter(charType, scene.nervous || false);
            
            // 更新对话
            const speakerEl = document.getElementById('speaker');
            speakerEl.textContent = scene.speaker;
            if (scene.quiz) {
                speakerEl.classList.add('quiz-question');
            } else {
                speakerEl.classList.remove('quiz-question');
            }
            typeWriter(scene.text, 'dialogue-text');
            
            // 生成选项
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            scene.choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice.text;
                
                // 只有 track: true 的选项才标记已选
                if (choice.track) {
                    const choiceKey = sceneId + '_' + index;
                    if (state.selectedChoices[choiceKey]) {
                        btn.classList.add('selected');
                    }
                    
                    btn.onclick = () => {
                        state.selectedChoices[choiceKey] = true;
                        handleChoice(choice);
                    };
                } else {
                    btn.onclick = () => handleChoice(choice);
                }
                
                choicesDiv.appendChild(btn);
            });
            
            // 处理热点
            const hotspotsDiv = document.getElementById('hotspots');
            hotspotsDiv.innerHTML = '';
            if (scene.hotspots) {
                scene.hotspots.forEach(hotspot => {
                    const div = document.createElement('div');
                    div.className = 'hotspot' + (hotspot.collected ? ' collected' : '');
                    div.style.left = hotspot.x + '%';
                    div.style.top = hotspot.y + '%';
                    div.style.width = hotspot.w + '%';
                    div.style.height = hotspot.h + '%';
                    div.title = hotspot.name;
                    div.onclick = () => handleHotspot(hotspot, div);
                    hotspotsDiv.appendChild(div);
                });
            }
            
            // 添加线索
            if (scene.clue && !state.clues.includes(scene.clue)) {
                state.clues.push(scene.clue);
                updateCluePanel();
                document.getElementById('clue-count').textContent = '线索：' + state.clues.length;
            }
            // 替换线索（如神秘数字 → 保险箱证据）
            if (scene.clueAlt && state.clues.includes(scene.clueAlt)) {
                const idx = state.clues.indexOf(scene.clueAlt);
                state.clues[idx] = scene.clue;
                updateCluePanel();
                document.getElementById('clue-count').textContent = '线索：' + state.clues.length;
            }
        }

        // 打字机效果
        function typeWriter(text, elementId) {
            const element = document.getElementById(elementId);
            const choicesDiv = document.getElementById('choices');
            element.innerHTML = '';
            choicesDiv.classList.remove('visible');
            let i = 0;
            const speed = 20;
            const timer = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML = text.substring(0, i + 1) + '<span class="typing"></span>';
                    i++;
                } else {
                    clearInterval(timer);
                    element.innerHTML = text.replace(/\n/g, '<br>');
                    choicesDiv.classList.add('visible');
                }
            }, speed);
        }

        // 处理选择
        function handleChoice(choice) {
            if (choice.next) {
                // 特殊动作处理
                if (choice.action === 'open_safe_ui') {
                    openSafeUI();
                    return;
                }
                
                // 更新时间
                updateTime();
                
                // 处理答题
                if (choice.next.endsWith('_correct')) {
                    state.quizScore++;
                } else if (choice.next.endsWith('_wrong')) {
                    // 答错不加分
                }
                
                if (choice.next === 'safe_ui') {
                    openSafeUI();
                    return;
                } else if (choice.next === 'accuse_li' && checkTrueEnding()) {
                    loadScene('ending_true');
                } else if (choice.next.startsWith('ending_')) {
                    showEnding(choice.next);
                } else if (choice.next === 'quiz_result') {
                    showQuizResult();
                } else if (choice.next === 'death') {
                    showEnding('death');
                } else {
                    loadScene(choice.next);
                }
            }
        }
        
        // 显示问答结果
        function showQuizResult() {
            state.quizTotal = 6;
            const scene = scenes['quiz_result'];
            const correctCount = state.quizScore;
            
            if (correctCount === state.quizTotal) {
                scene.text = '完美！你答对了所有 ' + correctCount + ' 个问题！\n\n案情还原：\n李明在王伯送咖啡时潜入书房，藏在暗处。王伯离开后，他将氰化物放入咖啡，逼迫陈明远喝下。随后他用钓鱼线从外部旋转门锁，制造了完美密室。\n\n书房保险箱里的账本揭露了全部真相——有人挪用资金数百万元，陈明远发现后准备报警并将公司转给他人。绝望之下，凶手选择了杀人灭口。\n\n数字 1-6-9-0 是提示，真正密码是 0-6-9-1——倒过来的数字，就像这起案件背后颠倒黑白的真相。\n\n🎉 恭喜，成功破案！';
                scene.ending = 'true';
            } else {
                scene.text = '你答对了 ' + correctCount + '/' + state.quizTotal + ' 个问题。\n\n虽然指认了李明，但案情还原不够完整。密室手法、作案动机等关键细节仍有疑点。\n\n李明被判刑，但真相的阴影依然笼罩着这个案件...\n\n❌ 遗憾，未能完全还原真相。';
                scene.ending = 'partial';
            }
            showEnding('quiz_result');
        }

        // 处理热点
        function handleHotspot(hotspot, element) {
            if (hotspot.collected) return;
            const scene = scenes[state.currentScene];
            const choice = scene.choices.find(c => c.action === 'check_' + hotspot.id);
            if (choice) {
                hotspot.collected = true;
                element.classList.add('collected');
                loadScene(choice.next);
            }
        }

        // 线索详细描述
        const clueDetails = {
            '时间线：9 点后无人进出': '管家王伯声称晚上 9 点送咖啡后，就再也没人进出过书房。这意味着如果凶手从外面进入，必须在 9 点之前就已经在书房内，或者...有其他方式进入。',
            '备用钥匙无法打开反锁的门': '王伯持有的备用钥匙无法打开从内部反锁的书房门。这证实了门确实是从里面锁上的——或者说，看起来是这样。',
            '钥匙孔有异常划痕': '钥匙孔边缘有轻微的金属划痕。如果是从内部用旋钮反锁，不应该有这种痕迹。这暗示...可能有人从外部用某种工具操作了锁。',
            '门只能从内部反锁': '书房的门是老式旋钮锁，只能从内部旋转反锁。门缝严密，没有明显缝隙。典型的密室配置。',
            '窗户从内部闩住，窗外无脚印': '窗户的插销确实处于锁定状态。窗外草坪上没有脚印，昨晚的暴雨会冲刷掉痕迹，但也没有新的痕迹。',
            '神秘数字：1-6-9-0': '文件上写着的数字 1-6-9-0，可能是保险箱密码的提示。但直接输入这个组合无法打开保险箱。',
            '威胁信：明晚 8 点老地方': '撕碎的信件显示有人威胁死者，约定"明晚 8 点"在"老地方"见面。这是谋杀动机的重要线索。',
            '死因：氰化物中毒，时间：22:00-23:00': '法医确认死者死于氰化物中毒，咖啡杯中有残留。死亡时间推断在晚上 10 点到 11 点之间。',
            '死者手中：深蓝色西装布料': '死者临死前从凶手身上扯下的布料，深蓝色西装材质。这是指向凶手身份的关键物证。',
            '李明：声称在家，无人证': '李明声称案发时独自在家，但没有人能证明。他的不在场证明存在漏洞。',
            '李明与死者有商业纠纷': '李明承认与陈明远有商业纠纷，涉及挪用项目资金。这构成了明显的作案动机。',
            '保险箱证据：神秘账本': '保险箱内找到的公司账本和股权转让协议草稿。账本显示有大量资金流向不明账户，股权转让协议显示陈明远准备将公司转给其他人。这些证据暗示了复杂的商业纠纷，但需要进一步分析才能确定具体涉及的人员。'
        };

        // 更新线索面板
        function updateCluePanel() {
            const clueList = document.getElementById('clue-list');
            clueList.innerHTML = '';
            state.clues.forEach(clue => {
                const div = document.createElement('div');
                div.className = 'clue-item';
                div.textContent = '• ' + clue;
                div.onclick = () => showClueDetail(clue);
                clueList.appendChild(div);
            });
            document.getElementById('clue-panel').classList.add('show');
        }

        // 显示线索详情
        function showClueDetail(clue) {
            const modal = document.getElementById('clue-detail-modal');
            const title = document.getElementById('clue-detail-title');
            const text = document.getElementById('clue-detail-text');
            title.textContent = '📋 ' + clue;
            text.textContent = clueDetails[clue] || '暂无详细信息。';
            modal.classList.add('show');
        }

        // 关闭线索详情
        function closeClueDetail() {
            document.getElementById('clue-detail-modal').classList.remove('show');
        }

        // 点击背景关闭
        document.getElementById('clue-detail-modal').addEventListener('click', (e) => {
            if (e.target.id === 'clue-detail-modal') {
                closeClueDetail();
            }
        });
        
        // 保险箱 UI 函数
        function openSafeUI() {
            state.safeCombo = [0, 0, 0, 0];
            updateDialDisplay();
            document.getElementById('safe-modal').classList.add('show');
        }
        
        function closeSafeModal() {
            document.getElementById('safe-modal').classList.remove('show');
            loadScene('study');
        }
        
        function adjustDial(index, delta) {
            state.safeCombo[index] = (state.safeCombo[index] + delta + 10) % 10;
            updateDialDisplay();
        }
        
        function updateDialDisplay() {
            for (let i = 0; i < 4; i++) {
                document.getElementById('dial-' + i).textContent = state.safeCombo[i];
            }
        }
        
        function trySafeCombo() {
            if (state.safeCombo.every((val, i) => val === SAFE_CODE[i])) {
                // 密码正确
                document.getElementById('safe-modal').classList.remove('show');
                loadScene('safe_open');
            } else {
                // 密码错误
                document.getElementById('safe-modal').classList.remove('show');
                loadScene('safe_wrong');
            }
        }

        // 显示结局
        function showEnding(endingId) {
            const scene = scenes[endingId];
            document.getElementById('end-screen').style.display = 'flex';
            
            let title = '结局';
            if (endingId === 'ending_true' || (endingId === 'quiz_result' && scene.ending === 'true')) {
                title = '🎉 真结局';
            } else if (endingId === 'ending_li' || (endingId === 'quiz_result' && scene.ending === 'partial')) {
                title = '📋 部分真相';
            } else if (endingId === 'quiz_result' && scene.ending === 'true') {
                title = '🎉 完美破案';
            } else if (endingId === 'death') {
                title = '💀 死亡结局';
            } else {
                title = '❌ 错误结论';
            }
            
            document.getElementById('end-title').textContent = title;
            document.getElementById('end-title').className = (endingId === 'ending_true' || (endingId === 'quiz_result' && scene.ending === 'true')) ? 'title-glow' : '';
            document.getElementById('end-reason').textContent = scene.text;
            
            let stats = '收集线索：' + state.clues.length + ' | 访问场景：' + Object.keys(state.visited).length;
            if (endingId === 'quiz_result') {
                stats += ' | 答题：' + state.quizScore + '/' + state.quizTotal;
            }
            if (endingId === 'death') {
                stats += ' | 耗时：' + state.gameTime + '分钟';
            }
            document.getElementById('end-stats').textContent = stats;
        }
    </script>
</body>
</html>
